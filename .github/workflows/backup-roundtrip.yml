# Encrypted backup round-trip
#
# Spins up an ephemeral Postgres + DuckDB, generates a synthetic schema
# with known row counts, runs `scripts/backup.sh` and
# `scripts/snapshot.sh` against an in-memory age key-pair, then drops
# the schema and replays the encrypted artefacts via
# `scripts/restore.sh`. The job fails unless the post-restore row
# counts match the pre-backup counts byte-for-byte.
#
# All third-party actions are pinned to a full commit SHA, with the
# human-readable version on a trailing comment. Dependabot keeps both
# in sync (see `.github/dependabot.yml`).

name: backup-roundtrip

on:
  pull_request:
    paths:
      - scripts/**
      - tests/scripts/**
      - .github/workflows/backup-roundtrip.yml
  push:
    branches: [main]
    paths:
      - scripts/**
      - tests/scripts/**
      - .github/workflows/backup-roundtrip.yml

permissions:
  contents: read

concurrency:
  group: backup-roundtrip-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roundtrip:
    name: encrypt → decrypt → restore
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        # postgres:17-alpine — same digest pinned in compose.yaml.
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: penge
          POSTGRES_PASSWORD: penge
          POSTGRES_DB: penge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U penge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://penge:penge@localhost:5432/penge
      PENGE_BACKUP_ROOT: ${{ github.workspace }}/_backups
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install age, postgresql-client-17, duckdb
        run: |
          set -euo pipefail
          # Ubuntu's default postgresql-client is v16; the service runs v17,
          # so pull pg_dump/psql 17 from the PGDG apt repository. Validate
          # the signing key's fingerprint before trusting it — the same
          # fingerprint PGDG has published since 2008
          # (https://www.postgresql.org/download/linux/ubuntu/).
          PGDG_KEY_FPR="B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8"
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          actual="$(gpg --show-keys --with-colons --with-fingerprint \
                    /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
                    | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ "${actual}" != "${PGDG_KEY_FPR}" ]]; then
            echo "::error::PGDG signing-key fingerprint mismatch: got ${actual}, expected ${PGDG_KEY_FPR}"
            sudo rm -f /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
            exit 1
          fi
          CODENAME="$(. /etc/os-release && echo "${VERSION_CODENAME}")"
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends age postgresql-client-17 unzip
          # DuckDB CLI is not packaged in apt; pull the pinned release.
          DUCKDB_VERSION="1.1.3"
          DUCKDB_SHA256="efd0fccdb1a28d9ec7a6ebfcde59900068b8ba43a846c9b553c0fd2bbe4acf43"
          curl -sSL -o duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          echo "${DUCKDB_SHA256}  duckdb.zip" | sha256sum -c -
          unzip -q duckdb.zip -d _duckdb
          sudo install -m 0755 _duckdb/duckdb /usr/local/bin/duckdb
          rm -rf duckdb.zip _duckdb
          age --version
          # Place pg17 binaries ahead of the apt-installed v16 stubs.
          echo "/usr/lib/postgresql/17/bin" >> "${GITHUB_PATH}"
          /usr/lib/postgresql/17/bin/pg_dump --version
          duckdb --version

      - name: Generate ephemeral age key-pair
        id: keypair
        run: |
          set -euo pipefail
          mkdir -p _keys
          age-keygen -o _keys/identity.txt 2> _keys/keygen.stderr
          chmod 600 _keys/identity.txt
          PUB="$(awk -F': ' '/Public key/ {print $2}' _keys/keygen.stderr)"
          test -n "${PUB}"
          echo "PENGE_BACKUP_RECIPIENTS=${PUB}" >> "${GITHUB_ENV}"
          echo "PENGE_BACKUP_IDENTITY_FILE=${PWD}/_keys/identity.txt" >> "${GITHUB_ENV}"

      - name: Seed synthetic Postgres schema
        run: |
          set -euo pipefail
          psql --dbname "${DATABASE_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS bk_smoke CASCADE;
          CREATE SCHEMA bk_smoke;
          CREATE TABLE bk_smoke.accounts (
              id    INT PRIMARY KEY,
              label TEXT NOT NULL
          );
          CREATE TABLE bk_smoke.transactions (
              id         BIGSERIAL PRIMARY KEY,
              account_id INT REFERENCES bk_smoke.accounts(id),
              amount     NUMERIC(18, 2) NOT NULL,
              booked_on  DATE NOT NULL
          );
          INSERT INTO bk_smoke.accounts VALUES
              (1, 'GLS Giro'),
              (2, 'Lunar Tagesgeld'),
              (3, 'Aktiesparekonto');
          INSERT INTO bk_smoke.transactions (account_id, amount, booked_on)
          SELECT (i % 3) + 1,
                 (random() * 1000)::numeric(18, 2),
                 DATE '2025-01-01' + (i % 365)
            FROM generate_series(1, 1000) AS s(i);
          SQL

      - name: Capture pre-backup row counts
        id: pre
        run: |
          set -euo pipefail
          A=$(psql --dbname "${DATABASE_URL}" -At -c 'SELECT count(*) FROM bk_smoke.accounts;')
          T=$(psql --dbname "${DATABASE_URL}" -At -c 'SELECT count(*) FROM bk_smoke.transactions;')
          echo "accounts=${A}" >> "${GITHUB_OUTPUT}"
          echo "transactions=${T}" >> "${GITHUB_OUTPUT}"
          echo "pre: accounts=${A} transactions=${T}"

      - name: Run scripts/backup.sh
        run: |
          set -euo pipefail
          ./scripts/backup.sh --label smoke
          ls -la "${PENGE_BACKUP_ROOT}/postgres"
          test -s "${PENGE_BACKUP_ROOT}"/postgres/pg-*-smoke.sql.age
          test -s "${PENGE_BACKUP_ROOT}"/postgres/pg-*-smoke.sql.age.sha256
          # Confirm the artefact is not pg_dump plaintext.
          if grep -q "PostgreSQL database dump" "${PENGE_BACKUP_ROOT}"/postgres/pg-*-smoke.sql.age 2>/dev/null; then
            echo "::error::backup artefact appears to be unencrypted"
            exit 1
          fi

      - name: Seed synthetic DuckDB and run scripts/snapshot.sh
        run: |
          set -euo pipefail
          mkdir -p _duck
          duckdb _duck/db.duckdb <<'SQL'
          CREATE TABLE positions (id INT, ticker VARCHAR, qty INT);
          INSERT INTO positions VALUES (1, 'VWCE', 50), (2, 'IDUS', 100);
          CREATE TABLE prices (ticker VARCHAR, as_of DATE, eur DECIMAL(10, 4));
          INSERT INTO prices VALUES ('VWCE', '2026-05-08', 120.5500),
                                    ('IDUS', '2026-05-08', 95.1200);
          SQL
          ./scripts/snapshot.sh --duckdb _duck/db.duckdb --label smoke
          ls -la "${PENGE_BACKUP_ROOT}/duckdb"
          test -s "${PENGE_BACKUP_ROOT}"/duckdb/duckdb-*-smoke.tar.age

      - name: Drop schema; restore.sh; verify row counts match
        run: |
          set -euo pipefail
          psql --dbname "${DATABASE_URL}" -v ON_ERROR_STOP=1 \
              -c 'DROP SCHEMA bk_smoke CASCADE;'
          ARTEFACT=$(ls "${PENGE_BACKUP_ROOT}"/postgres/pg-*-smoke.sql.age)
          ./scripts/restore.sh \
              --input "${ARTEFACT}" \
              --database-url "${DATABASE_URL}"
          A=$(psql --dbname "${DATABASE_URL}" -At -c 'SELECT count(*) FROM bk_smoke.accounts;')
          T=$(psql --dbname "${DATABASE_URL}" -At -c 'SELECT count(*) FROM bk_smoke.transactions;')
          echo "post: accounts=${A} transactions=${T}"
          test "${A}" = "${{ steps.pre.outputs.accounts }}"
          test "${T}" = "${{ steps.pre.outputs.transactions }}"

      - name: Restore DuckDB snapshot and verify manifest
        run: |
          set -euo pipefail
          ARTEFACT=$(ls "${PENGE_BACKUP_ROOT}"/duckdb/duckdb-*-smoke.tar.age)
          ./scripts/restore.sh --input "${ARTEFACT}" --duckdb-out _duck_restore
          test -s _duck_restore/manifest.tsv
          # Manifest carries qualified-name<TAB>file<TAB>row-count rows.
          # Both seeded tables must be present.
          grep -F "main.positions" _duck_restore/manifest.tsv
          grep -F "main.prices"    _duck_restore/manifest.tsv
          # Each row count must be > 0.
          while IFS=$'\t' read -r qualified file rows; do
            test "${rows}" -gt 0 || {
              echo "::error::empty table in manifest: ${qualified}"; exit 1; }
          done < _duck_restore/manifest.tsv

      - name: Smoke-test prune.sh
        run: |
          set -euo pipefail
          ./scripts/prune.sh --root "${PENGE_BACKUP_ROOT}" --dry-run
          ./scripts/prune.sh --root "${PENGE_BACKUP_ROOT}" \
              --daily 14 --weekly 8 --monthly 12

      - name: Reject any plaintext leftover under the backup root
        run: |
          set -euo pipefail
          # The scripts trap-clean their own scratch dirs, so any
          # `.scratch-*` artefact reaching this step indicates a
          # cleanup failure (and may contain plaintext parquet /
          # manifest data). Fail the job loudly in that case.
          if find "${PENGE_BACKUP_ROOT}" -type d -name '.scratch-*' \
                -print -quit | grep -q .; then
            echo "::error::scratch directory survived under the backup root:"
            find "${PENGE_BACKUP_ROOT}" -type d -name '.scratch-*' -print
            exit 1
          fi
          # Anything under the backup root that is *not* a `*.age` or a
          # `*.sha256` sidecar is a smoking gun.
          BAD=$(find "${PENGE_BACKUP_ROOT}" -type f \
                  ! -name '*.age' ! -name '*.sha256' || true)
          if [[ -n "${BAD}" ]]; then
            echo "::error::plaintext leftovers under backup root:"
            echo "${BAD}"
            exit 1
          fi

  shellcheck:
    name: shellcheck scripts/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      # `-x` follows `source` directives so lib_backup.sh symbols are
      # resolved when scanning the wrapper scripts. SC2155 (declare-and-
      # assign) is silenced because it fires on the idiomatic
      # `local x="$(cmd)"` pattern used pervasively here.
      - run: |
          cd scripts
          shellcheck -x -e SC2155 ./*.sh
