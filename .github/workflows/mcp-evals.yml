# MCP golden-question evals (issue #54).
#
# Runs the deterministic eval harness in `apps/mcp/evals/runner.ts`
# whenever a PR touches the MCP server, the simulator, or the tax
# calculators — those are the three subsystems the harness exercises
# through the MCP tool layer.
#
# The suite is offline: every tool runs against synthetic fixtures, no
# Postgres or Python subprocess is spawned. Failures include the
# golden question text and a diff via vitest's standard reporter.

name: mcp-evals

on:
  pull_request:
    paths:
      - "apps/mcp/**"
      - "src/penge/sim/**"
      - "src/penge/tax/**"
      - ".github/workflows/mcp-evals.yml"
  push:
    branches: [main]
    paths:
      - "apps/mcp/**"
      - "src/penge/sim/**"
      - "src/penge/tax/**"
      - ".github/workflows/mcp-evals.yml"

permissions:
  contents: read

concurrency:
  group: mcp-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: MCP golden-question evals
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Enable corepack & pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate
          pnpm --version
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Run MCP eval suite
        run: pnpm --filter @penge/mcp exec vitest run --config vitest.evals.config.ts
