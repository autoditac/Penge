# Continuous Integration
#
# NOTE: actions are currently pinned by major version for the bootstrap phase.
# Follow-up issue tracks pinning every action by full commit SHA before merging
# any production code (see SECURITY.md).

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Conventional Commit PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            revert
          requireScope: false

  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/CHANGELOG.md

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install yamllint
      - run: yamllint -s .

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --no-banner --redact --verbose --source .

  bootstrap-smoke:
    name: Bootstrap smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify required files
        run: |
          set -euo pipefail
          for f in README.md CONTRIBUTING.md SECURITY.md AGENTS.md \
                   .github/copilot-instructions.md \
                   .github/PULL_REQUEST_TEMPLATE.md \
                   .github/CODEOWNERS \
                   .github/dependabot.yml \
                   .gitignore .editorconfig; do
            if [ ! -f "$f" ]; then
              echo "missing: $f"; exit 1
            fi
          done
          echo "Bootstrap layout OK"
