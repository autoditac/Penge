# yamllint config
extends: default

rules:
  line-length:
    max: 200
    level: warning
  document-start: disable
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  node_modules/
  .venv/
  data/
  target/
  dbt_packages/
