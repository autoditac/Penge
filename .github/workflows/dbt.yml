# dbt smoke build
#
# Runs on every PR and on push to main. The job:
#   1. Spins up Postgres 17.
#   2. Runs `alembic upgrade head` so the source tables exist.
#   3. Runs `dbt deps`, `dbt parse`, then `dbt build` against the
#      empty project. With zero models this is a no-op build that
#      verifies the project is parseable, the profile is valid, and
#      sources resolve. Each follow-up PR that adds a model
#      automatically extends this same job's coverage.

name: dbt

on:
  pull_request:
    paths:
      - dbt/**
      - migrations/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/dbt.yml
  push:
    branches: [main]
    paths:
      - dbt/**
      - migrations/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/dbt.yml

permissions:
  contents: read

concurrency:
  group: dbt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: dbt build (smoke)
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 10
    services:
      postgres:
        # postgres:17-alpine — same digest pinned in compose.yaml.
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: penge
          POSTGRES_PASSWORD: penge
          POSTGRES_DB: penge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U penge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://penge:penge@localhost:5432/penge
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: penge
      PGPASSWORD: penge
      PGDATABASE: penge
      PGSSLMODE: disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install db + dbt deps
        run: uv sync --group db --group dbt --frozen

      - name: alembic upgrade head
        run: uv run --group db alembic upgrade head

      - name: dbt deps
        run: uv run --group dbt dbt deps --project-dir dbt --profiles-dir dbt

      - name: dbt parse
        run: uv run --group dbt dbt parse --project-dir dbt --profiles-dir dbt

      - name: dbt build
        run: uv run --group dbt dbt build --project-dir dbt --profiles-dir dbt
