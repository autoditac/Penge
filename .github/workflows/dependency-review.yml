name: dependency-review

# NOTE: actions/dependency-review-action requires GitHub Advanced Security
# on private repositories. While Penge is private and GHAS is not enabled,
# this job is best-effort: it runs but does not block PR merges.
# Re-evaluate when the repo is made public or GHAS is enabled — see the
# tracking issue in the repo backlog.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: [self-hosted, linux, x64, penge]
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: high
