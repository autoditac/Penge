# docker-compose for local development.
# Phase 0 brings up Postgres + Adminer; further services land in later phases.
#
# Image digests are pinned. Bumps go through Dependabot.

name: penge

services:
  postgres:
    # postgres:17-alpine — digest resolved 2026-05-06 via skopeo inspect.
    # Dependabot (docker ecosystem in .github/dependabot.yml) keeps this in sync.
    image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
    container_name: penge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-penge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-penge}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-penge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    # adminer:5-standalone — digest resolved 2026-05-06 via skopeo inspect.
    image: adminer:5-standalone@sha256:41898b976011fd87f2d3037366ad97f7d89fddfebc8aa8b3a7d77d0c465aa37b
    container_name: penge-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  uptime-kuma:
    # louislam/uptime-kuma:1 — digest resolved 2026-05-10 via skopeo inspect.
    # Dependabot (docker ecosystem in .github/dependabot.yml) keeps this in sync.
    # Uptime Kuma stores its state (monitor configs, heartbeat history) in a
    # SQLite DB under /app/data; the bind mount preserves it across upgrades.
    # See docs/runbook/healthchecks.md for first-time setup, monitor configs,
    # and how the vault watcher + ingestion jobs wire into it (issue #52).
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: penge-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
