# Release-time supply-chain attestations.
#
# Triggers on `release: { types: [published] }`, so it runs after
# release-please's draft is promoted to published (manually or via the
# release-please-action's auto-publish). Also exposes `workflow_dispatch`
# so the wiring can be smoke-tested without cutting a real tag.
#
# What it does today (Phase 0):
#
# - Generates an SPDX SBOM of the repository source tree using anchore/
#   sbom-action (syft).
# - Uploads the SBOM as a workflow artifact.
# - Attaches the SBOM file to the GitHub release.
# - Generates a SLSA build-provenance attestation for the SBOM via
#   actions/attest-build-provenance (uses the OIDC token that GitHub
#   issues to the workflow).
#
# Application images:
#
# - The `images` job builds each app with a Containerfile, pushes to
#   ghcr.io/<owner>/penge/<app>, emits an image SBOM, and records build
#   provenance for the pushed digest.
#
# Permissions rationale:
#
# - contents: write          — attach SBOM file to the release
# - id-token: write          — sigstore OIDC for attestations
# - attestations: write      — write to the attestations API
# - packages: write          — push images to GHCR (future images job)

name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  source-sbom:
    name: Source SBOM + provenance
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate SPDX SBOM (source tree)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: penge-source-sbom.spdx.json
          output-file: penge-source-sbom.spdx.json
          # Don't auto-attach to the release here; we do it in the next
          # step so we control the file name and can add the attestation
          # alongside it.
          upload-release-assets: false
          upload-artifact: true

      - name: Attest build provenance for SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: penge-source-sbom.spdx.json

      - name: Attach SBOM to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: penge-source-sbom.spdx.json
          fail_on_unmatched_files: true

  images:
    name: Image build + SBOM + provenance
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Containerfile
          push: true
          sbom: true
          # Provenance is recorded once, via the explicit
          # actions/attest-build-provenance step below; BuildKit's
          # built-in attestation would be a second, divergent record.
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/penge/${{ matrix.app }}:${{ github.event.release.tag_name || format('manual-{0}', github.run_number) }}
            ghcr.io/${{ github.repository_owner }}/penge/${{ matrix.app }}:${{ github.sha }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/penge/${{ matrix.app }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
