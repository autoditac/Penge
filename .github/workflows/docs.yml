# Build the MkDocs Material site on every PR (--strict, as a quality gate)
# and deploy to GitHub Pages on every push to main.
#
# All third-party actions are pinned to a full commit SHA; Dependabot keeps
# both the SHA and the trailing version comment in sync.

name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: [self-hosted, linux, x64, penge]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install docs deps
        run: uv sync --only-group docs

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, penge]
    permissions:
      contents: write  # gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gh-deploy needs full history to fast-forward gh-pages

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install docs deps
        run: uv sync --only-group docs

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: mkdocs gh-deploy
        run: uv run mkdocs gh-deploy --force
