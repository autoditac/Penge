# Continuous Integration
#
# All third-party actions are pinned to a full commit SHA, with the human-readable
# version on a trailing comment. Dependabot keeps both in sync (see
# `.github/dependabot.yml`).

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Conventional Commit PR title
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, x64, penge]
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            revert
          requireScope: false

  lint-markdown:
    name: Markdown lint
    runs-on: [self-hosted, linux, x64, penge]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/CHANGELOG.md

  yaml-lint:
    name: YAML lint
    runs-on: [self-hosted, linux, x64, penge]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.3.1
        with:
          version: "0.7.3"
      - name: Run YAML lint
        run: uvx yamllint -s .

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: [self-hosted, linux, x64, penge]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --no-banner --redact --verbose --source .

  bootstrap-smoke:
    name: Bootstrap smoke
    runs-on: [self-hosted, linux, x64, penge]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Verify required files
        run: |
          set -euo pipefail
          for f in README.md CONTRIBUTING.md SECURITY.md AGENTS.md \
                   .github/copilot-instructions.md \
                   .github/PULL_REQUEST_TEMPLATE.md \
                   .github/CODEOWNERS \
                   .github/dependabot.yml \
                   .gitignore .editorconfig; do
            if [ ! -f "$f" ]; then
              echo "missing: $f"; exit 1
            fi
          done
          echo "Bootstrap layout OK"

  web-ui:
    name: WebUI build, lint, test
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Enable corepack & pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate
          pnpm --version
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Check generated API client is current
        run: |
          set -euo pipefail
          pnpm --filter @penge/web generate:api
          git diff --exit-code apps/web/src/api/schema.d.ts
      - name: Build WebUI
        run: pnpm --filter @penge/web build
      - name: Test WebUI
        run: pnpm --filter @penge/web test
      - name: Lint WebUI
        run: pnpm --filter @penge/web lint

  container-images:
    name: Container image build (${{ matrix.app }})
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app: [web, api]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Build application image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: apps/${{ matrix.app }}/Containerfile
          push: false
          # Load the API image into the local daemon so the boot
          # smoke-test below can run it. Single-platform build, so `load`
          # is safe. Web needs no boot test, so skip the extra load there.
          load: ${{ matrix.app == 'api' }}
          # Build-only verification: BuildKit's default provenance
          # attestation is wasted work here (nothing is published).
          provenance: false
          tags: penge/${{ matrix.app }}:ci
      - name: Boot smoke-test (api)
        if: matrix.app == 'api'
        # A successful `docker build` does not prove the app can import:
        # runtime dependencies missing from the image only surface when the
        # process starts. Importing the ASGI app exercises the full import
        # graph (including the connections router -> Enable Banking client)
        # without needing a database, so a missing runtime dep fails CI
        # instead of crash-looping in production. Guards #232.
        run: |
          docker run --rm penge/api:ci \
            python -c "import penge.api.app; print('api import OK')"

  alembic-roundtrip:
    name: Alembic round-trip
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 10
    services:
      postgres:
        # postgres:17-alpine — same digest pinned in compose.yaml.
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: penge
          POSTGRES_PASSWORD: penge
          POSTGRES_DB: penge
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U penge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install db deps
        run: uv sync --group db --frozen
      - name: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://penge:penge@localhost:${{ job.services.postgres.ports['5432'] }}/penge
        run: uv run --group db alembic upgrade head
      - name: alembic downgrade base
        env:
          DATABASE_URL: postgresql+psycopg://penge:penge@localhost:${{ job.services.postgres.ports['5432'] }}/penge
        run: uv run --group db alembic downgrade base
      - name: alembic upgrade head (idempotency check)
        env:
          DATABASE_URL: postgresql+psycopg://penge:penge@localhost:${{ job.services.postgres.ports['5432'] }}/penge
        run: uv run --group db alembic upgrade head

  pytest:
    name: pytest
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 10
    services:
      postgres:
        # postgres:17-alpine — same digest pinned in compose.yaml.
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: penge
          POSTGRES_PASSWORD: penge
          POSTGRES_DB: penge
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U penge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install OCR system deps (tesseract + poppler)
        # The PFA connector's OCR fallback path uses pytesseract +
        # pdf2image, which both shell out to native binaries. We
        # install the binaries here so the OCR tests can rasterise
        # fixtures and run Tesseract in CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-dan tesseract-ocr-deu poppler-utils
      - name: Install dev + db deps
        run: uv sync --group dev --group db --group http --group web --group manual --group enablebanking --group parsers --group ocr --group vault --group report --group api --frozen
      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://penge:penge@localhost:${{ job.services.postgres.ports['5432'] }}/penge
          PENGE_TEST_DATABASE_URL: postgresql+psycopg://penge:penge@localhost:${{ job.services.postgres.ports['5432'] }}/penge
        run: uv run --group dev --group db --group http --group web --group manual --group enablebanking --group parsers --group ocr --group vault --group report --group api pytest
