site_name: Penge
site_description: Private personal-finance & FIRE-modeling platform
repo_url: https://github.com/autoditac/Penge
repo_name: autoditac/Penge
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Architecture:
      - architecture/index.md
  - Connectors:
      - connectors/index.md
      - "ECB daily FX rates": connectors/ecb_fx.md
      - "GoCardless (PSD2)": connectors/gocardless.md
      - "GLS Bank (Enable Banking)": connectors/gls.md
      - "Evangelische Bank (Enable Banking)": connectors/evangelische-bank.md
      - "Lunar (Enable Banking)": connectors/lunar.md
      - "Growney / Sutor Bank (PDF)": connectors/growney.md
      - "PFA pension (PDF)": connectors/pfa.md
      - "Nordnet (DK CSV)": connectors/nordnet.md
      - "Skat ABIS list": connectors/abis.md
      - "Manual entries": connectors/manual.md
  - Analytics:
      - "dbt": dbt.md
  - Simulation:
      - "Return model": sim/return-model.md
  - Tax:
      - DK: tax/dk.md
      - DE: tax/de.md
  - Runbook:
      - runbook/monthly.md
      - "Web dashboard": runbook/web.md
      - "ABIS yearly refresh": runbook/abis-yearly-refresh.md
      - "Branch protection": runbook/branch-protection.md
      - "Vault watcher": runbook/vault-watcher.md
      - "Encrypted backups": runbook/backups.md
  - Decisions:
      - decisions/README.md
      - "ADR-0001 Self-hosted Postgres + DuckDB stack": decisions/0001-self-hosted-postgres-duckdb-stack.md
      - "ADR-0002 Custom monorepo over off-the-shelf PFM": decisions/0002-custom-monorepo-over-off-the-shelf-pfm.md
      - "ADR-0003 Hybrid ingestion (PSD2 + CSV/PDF)": decisions/0003-hybrid-ingestion-psd2-and-csv-pdf.md
      - "ADR-0004 EUR and DKK shown in parallel": decisions/0004-eur-and-dkk-shown-in-parallel.md
      - "ADR-0005 LLM access via MCP only": decisions/0005-llm-access-via-mcp-only.md
      - "ADR-0006 Trunk-based + Conventional Commits + ADRs": decisions/0006-trunk-based-conventional-commits-adrs.md
      - "ADR-0007 Initial relational data model": decisions/0007-initial-relational-data-model.md
      - "ADR-0008 Nordnet account modelling": decisions/0008-nordnet-account-modelling.md
      - "ADR-0009 ABIS list & instrument tax treatment": decisions/0009-abis-list-and-instrument-tax-treatment.md
      - "ADR-0010 Simulation return model: historical block-bootstrap": decisions/0010-sim-return-model.md
      - "ADR-0011 Simulation cashflow engine: deterministic projection": decisions/0011-sim-cashflow-engine.md
      - "ADR-0012 FIRE goal evaluation model": decisions/0012-sim-goal-model.md
      - "ADR-0013 Simulation tax overlay": decisions/0013-sim-tax-overlay.md
      - "ADR-0014 Monte-Carlo FIRE runner": decisions/0014-sim-montecarlo-runner.md
      - "ADR-0015 Scenario engine": decisions/0015-sim-scenario-engine.md
      - "ADR-0016 Tax-lot tracker (gennemsnitsmetoden)": decisions/0016-tax-lot-tracker.md
      - "ADR-0017 Lagerbeskatning calculator": decisions/0017-lagerbeskatning-calculator.md
      - "ADR-0018 Aktiesparekonto handling": decisions/0018-aktiesparekonto-handling.md
      - "ADR-0019 PAL-skat tracking": decisions/0019-pal-skat-tracking.md
      - "ADR-0020 SKAT report generator": decisions/0020-skat-report-generator.md
      - "ADR-0021 DE Vorabpauschale calculator": decisions/0021-de-vorabpauschale.md
      - "ADR-0022 Streamlit projection dashboard tab": decisions/0022-web-projection-dashboard.md
      - "ADR-0023 MCP server architecture (TypeScript skeleton)": decisions/0023-mcp-server-architecture.md
      - "ADR-0024 Vault layout": decisions/0024-vault-layout.md
      - "ADR-0025 Encrypted backups: age + Parquet snapshots": decisions/0025-encrypted-backups.md
