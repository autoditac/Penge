[alembic]
# Per migrations.instructions.md, migrations live under `migrations/`.
script_location = migrations

# Filename template: <rev>_<imperative_snake_case_summary>.py
file_template = %%(rev)s_%%(slug)s

# UTC ISO-style timestamps in revision IDs would be nice, but Alembic's
# default 12-hex revision is what scripts expect; keep it.

# Connection URL is supplied at runtime via the DATABASE_URL env var
# (see migrations/env.py). This stays empty so secrets never enter the
# repo.
sqlalchemy.url =

# Don't truncate slugs; full descriptive filenames are preferred.
truncate_slug_length = 80

[post_write_hooks]
# Format new migration files with ruff so they match repo style without
# manual cleanup.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
