# CodeQL static analysis. Runs on every PR, on push to main, and weekly to
# catch newly disclosed query patterns against frozen code.
#
# Languages match what's actually in the repo today; expand as new sources
# land. `javascript-typescript` covers both JS and TS via the same database.
# Python is intentionally not in the matrix yet — CodeQL fails finalize if
# the database has zero source files. Re-add once #10 lands the Alembic
# skeleton (or any first .py).
#
# `continue-on-error: true` mirrors the dependency-review pattern from #56:
# this is a private repo without GitHub Advanced Security, so the
# `code-scanning/sarifs` upload endpoint returns 403 ("Code scanning is not
# enabled for this repository"). The job still runs the queries and surfaces
# findings in the workflow logs; flip both pieces (matrix + continue-on-error)
# when GHAS lands or the repo goes public.
#
# All third-party actions are pinned to a full commit SHA; Dependabot keeps
# both the SHA and the trailing version comment in sync.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 04:23 UTC — off-peak for GitHub-hosted runners.
    - cron: "23 4 * * 0"

permissions:
  contents: read
  security-events: write   # upload SARIF
  actions: read            # required by codeql-action on private repos

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true # see header — no GHAS on this private repo yet
    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript: single language id, scans both JS and TS
        # python: re-add once #10 lands the first .py source
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          # security-extended adds high-confidence security queries beyond
          # the default set; keep noise low until we have real code.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3
        with:
          category: "/language:${{ matrix.language }}"
