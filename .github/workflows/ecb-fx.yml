# Scheduled ECB FX rate refresh.
#
# This workflow is **gated by the repository variable**
# ``PENGE_FX_INGEST_ENABLED``. It runs daily and on manual dispatch, but
# every job is wrapped in:
#
#     if: vars.PENGE_FX_INGEST_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
#
# so the cron is a no-op until you set that variable. The dispatch path
# stays available for ad-hoc backfills regardless.
#
# The workflow expects a ``DATABASE_URL`` secret pointing at the
# operational Postgres. Until that infra exists, run the loader locally
# (``just up`` + ``uv run penge-ecb-fx --latest``).

name: ecb-fx

on:
  schedule:
    # 16:30 UTC ≈ 18:30 CET, after ECB publishes (~16:00 CET). Weekdays
    # only — ECB does not publish on weekends or TARGET2 holidays.
    - cron: "30 16 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which feed to load"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - last_90d
          - historical

permissions:
  contents: read

concurrency:
  group: ecb-fx
  cancel-in-progress: false

jobs:
  load:
    name: Load ECB rates
    runs-on: [self-hosted, linux, x64, penge]
    timeout-minutes: 15
    if: vars.PENGE_FX_INGEST_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install db deps
        run: uv sync --group db --frozen
      - name: Load
        run: |
          set -euo pipefail
          mode="${{ github.event.inputs.mode || 'latest' }}"
          case "$mode" in
            latest)     uv run --group db penge-ecb-fx --latest ;;
            last_90d)   uv run --group db penge-ecb-fx --90d ;;
            historical) uv run --group db penge-ecb-fx --since 2014-01-01 ;;
            *) echo "unknown mode: $mode"; exit 1 ;;
          esac
