# Pre-commit hooks. Install with: pre-commit install --install-hooks && pre-commit install --hook-type commit-msg
#
# These hooks codify quality gates locally so CI failures are rare.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: check-yaml
        # mkdocs.yml uses pymdownx custom tags that PyYAML cannot resolve
        # without `--unsafe`; yamllint covers it instead.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: forbid-submodules

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        # Stubs for third-party libraries we type-check against.
        # Keep this list minimal; add only when a new dep introduces
        # genuine type-check coverage gaps.
        additional_dependencies:
          - pydantic
          - types-PyYAML
          # FastAPI route decorators and pytest fixture decorators are
          # reported as untyped under --strict without the real
          # packages in the hook env (src/penge/api, tests/api).
          - fastapi
          - pytest

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        # dbt-style dialect; refine in dbt phase via .sqlfluff config.
        args: [--dialect, postgres]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        # Limit to TS/TSX/JSON for now. Markdown is owned by markdownlint
        # (formatting conflicts otherwise); YAML by yamllint. Re-scope once
        # the TS workspace and shared prettier config land.
        types_or: [ts, tsx, json]
        # docs/api/openapi.json is generated by `just api-openapi` and
        # kept current by a drift test; prettier must not rewrite it.
        exclude: ^docs/api/openapi\.json$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.3.0
    hooks:
      - id: eslint
        types_or: [ts, tsx]
        # Activates once the MCP TS workspace ships its eslint.config.js.
        # Until then this hook is a no-op (no matching files).

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.jsonc"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-s"]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
